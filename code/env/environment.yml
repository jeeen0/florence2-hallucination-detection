name: florence2-hallu
channels:
  - pytorch
  - nvidia
  - conda-forge
  - defaults
dependencies:
  - python=3.10
  - pip
  - pip:
      - torch
      - torchvision
      # Florence-2 trust_remote_code is not compatible with transformers 5.x.
      - "transformers==4.49.0"
      - accelerate
      - timm
      - einops
      - pillow
      - opencv-python
      - matplotlib
      - pandas
      - numpy
      - tqdm
      - pycocotools
      - pyyaml
